services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
