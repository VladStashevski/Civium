name: VPS Inspect

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/civium_deploy
          chmod 600 ~/.ssh/civium_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Inspect VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/civium_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            'set -euo pipefail
             echo "hostname=$(hostname)"
             public_ip="$(curl -fsS --max-time 8 https://api.ipify.org || true)"
             if [ -n "$public_ip" ]; then
               printf "public_ip_dotted=%s\n" "$(printf "%s" "$public_ip" | sed "s/\./ dot /g")"
             fi
             cd /opt/civium
             docker compose ps
             echo "--- docker ports ---"
             docker ps --format "table {{.Names}}\t{{.Ports}}"
             echo "--- listeners ---"
             ss -ltnp | sed -n "1,80p"'
