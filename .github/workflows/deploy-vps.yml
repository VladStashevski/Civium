name: Deploy to VPS

on:
  workflow_run:
    workflows:
      - Continuous Integration
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: civium-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/civium_deploy
          chmod 600 ~/.ssh/civium_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy current main branch
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/civium_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$VPS_USER@$VPS_HOST" \
            'cd /opt/civium &&
             git fetch --prune origin main &&
             git reset --hard origin/main &&
             /opt/civium/scripts/deploy-vps.sh'
